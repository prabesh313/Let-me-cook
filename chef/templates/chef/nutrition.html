<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nutritional Value</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light py-5">

  <div class="container" style="max-width: 700px;">

    <a href="javascript:history.back()" class="btn btn-outline-secondary btn-sm mb-4">← Back to Recipe</a>

    <div class="mb-3">
      <h1 class="h3 fw-bold">Nutritional Value</h1>
      <span class="badge bg-secondary">Ingredients: {{ ingredients }}</span>
    </div>

    <div class="card shadow-sm p-4" style="white-space: pre-wrap; line-height: 1.8;">
      {{ nutrition }}
    </div>

    <div class="d-flex gap-2 mt-4">
      <a href="{% url 'index' %}" class="btn btn-primary">Generate New Recipe</a>
      <button class="btn btn-outline-secondary" onclick="window.print()"> Print</button>
    </div>

    <p class="text-center text-muted mt-4" style="font-size: 0.8rem;">
      Nutritional values are AI-estimated · Not a substitute for professional dietary advice
    </p>

  </div>

</body>
</html>
