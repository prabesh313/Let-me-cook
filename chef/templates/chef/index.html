<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Recipe Generator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body class="bg-light min-vh-100 d-flex align-items-center justify-content-center py-5">

  <div class="card shadow-sm p-4" style="max-width: 560px; width: 100%;">
    <div class="text-center mb-4">
      <h1 class="h3 fw-bold mt-2">Let Me Cook</h1>
      <p class="text-muted">Enter the ingredients you have and AI will create a recipe instantly.</p>
    </div>

    <form method="POST" action="{% url 'generate' %}" onsubmit="showLoading()">
      {% csrf_token %}
      <div class="mb-3">
        <label for="ingredients" class="form-label fw-semibold">Your Ingredients</label>
        <textarea
          id="ingredients"
          name="ingredients"
          class="form-control"
          rows="4"
          placeholder="e.g. chicken, garlic, lemon, olive oil, potatoes"
          required
        >{% if ingredients %}{{ ingredients }}{% endif %}</textarea>
        <div class="form-text">💡 Try: eggs, cheese, spinach &nbsp;|&nbsp; rice, tomatoes, onion</div>
      </div>

      {% if error %}
        <div class="alert alert-danger py-2">{{ error }}</div>
      {% endif %}

      <button type="submit" id="submit-btn" class="btn btn-primary w-100">
        <span id="btn-text"> Generate Recipe</span>
        <span id="btn-loading" style="display:none;"> Generating...</span>
      </button>
    </form>

    <p class="text-center text-muted mt-3" style="font-size: 0.8rem;">
      Powered by Gemini 2.5 Flash
    </p>
  </div>

  <script>
    function showLoading() {
      document.getElementById('btn-text').style.display = 'none';
      document.getElementById('btn-loading').style.display = 'inline';
      document.getElementById('submit-btn').disabled = true;
    }
  </script>
</body>
